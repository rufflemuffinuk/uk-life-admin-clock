<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UK Life Admin Hours Wasted</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2rem;
    min-height: 100vh;
    font-family: Arial, Helvetica, sans-serif;
  }

  h1 {
    font-size: clamp(1.1rem, 3vw, 1.6rem);
    font-weight: 900;
    color: #111;
    text-align: center;
    letter-spacing: -0.01em;
    line-height: 1.3;
  }

  .clock {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .card {
    width: 44px;
    height: 60px;
    position: relative;
    perspective: 300px;
  }

  .face {
    width: 100%;
    height: 100%;
    border-radius: 5px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 2px 6px rgba(0,0,0,0.25);
  }

  .face::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 0;
    width: 100%;
    height: 1px;
    background: rgba(0,0,0,0.5);
    z-index: 5;
  }

  .half {
    position: absolute;
    left: 0;
    width: 100%;
    height: 50%;
    overflow: hidden;
    display: flex;
    justify-content: center;
  }

  .half.top { top: 0; align-items: flex-end; background: #1c1c1c; }
  .half.bot { bottom: 0; align-items: flex-start; background: #111; }

  .half span {
    font-family: 'Bebas Neue', cursive;
    font-size: 2.8rem;
    color: #fff;
    line-height: 1;
    transform: translateY(50%);
    display: block;
    user-select: none;
  }

  .half.bot span { transform: translateY(-50%); }

  .flap {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 50%;
    transform-origin: bottom center;
    overflow: hidden;
    border-radius: 5px 5px 0 0;
    z-index: 10;
    pointer-events: none;
    background: #1c1c1c;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }

  .flap span {
    font-family: 'Bebas Neue', cursive;
    font-size: 2.8rem;
    color: #fff;
    line-height: 1;
    transform: translateY(50%);
    display: block;
    user-select: none;
  }

  .flap.go {
    animation: flipDown 0.32s cubic-bezier(0.4,0,0.2,1) forwards;
  }

  @keyframes flipDown {
    0%   { transform: rotateX(0deg); }
    100% { transform: rotateX(-90deg); }
  }

  .comma {
    font-family: 'Bebas Neue', cursive;
    font-size: 2rem;
    color: #111;
    margin: 0 1px;
    padding-top: 14px;
    line-height: 1;
  }
</style>
</head>
<body>

<h1 id="title"></h1>
<div class="clock" id="clock"></div>

<script>
  const HOURS_PER_YEAR = 15_000_000_000;
  const TOTAL_DIGITS   = 11; // up to 99,999,999,999

  function getHoursWasted() {
    const now      = new Date();
    const yearStart = new Date(now.getFullYear(), 0, 1);
    const yearEnd   = new Date(now.getFullYear() + 1, 0, 1);
    const rate      = HOURS_PER_YEAR / ((yearEnd - yearStart) / 1000); // hrs/sec
    return Math.floor((now - yearStart) / 1000 * rate);
  }

  // Build DOM: groups 2-3-3-3
  const clockEl = document.getElementById('clock');
  const cards   = [];
  const curVals = Array(TOTAL_DIGITS).fill(null);

  [2, 3, 3, 3].forEach((count, gi, arr) => {
    for (let d = 0; d < count; d++) {
      const idx  = cards.length;
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="face">
          <div class="half top"><span class="tv">0</span></div>
          <div class="half bot"><span class="bv">0</span></div>
        </div>
        <div class="flap" id="flap${idx}"><span id="fs${idx}">0</span></div>`;
      clockEl.appendChild(card);
      cards.push(card);
    }
    if (gi < arr.length - 1) {
      const sep = document.createElement('div');
      sep.className = 'comma';
      sep.textContent = ',';
      clockEl.appendChild(sep);
    }
  });

  // Audio
  let actx = null;
  const startAudio = () => { if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)(); };
  document.addEventListener('click',      startAudio, { once: true });
  document.addEventListener('touchstart', startAudio, { once: true });

  function playFlip() {
    if (!actx) return;
    const t = actx.currentTime;
    // Click noise
    const n  = actx.sampleRate * 0.06;
    const b  = actx.createBuffer(1, n, actx.sampleRate);
    const bd = b.getChannelData(0);
    for (let i = 0; i < n; i++) bd[i] = (Math.random()*2-1) * Math.exp(-i/(n*0.1));
    const s = actx.createBufferSource(); s.buffer = b;
    const f = actx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=1800; f.Q.value=1;
    const g = actx.createGain(); g.gain.setValueAtTime(0.3,t); g.gain.exponentialRampToValueAtTime(0.001,t+0.06);
    s.connect(f); f.connect(g); g.connect(actx.destination); s.start(t);
    // Thud
    const n2  = actx.sampleRate * 0.04;
    const b2  = actx.createBuffer(1, n2, actx.sampleRate);
    const b2d = b2.getChannelData(0);
    for (let i = 0; i < n2; i++) b2d[i] = (Math.random()*2-1) * Math.exp(-i/(n2*0.3));
    const s2 = actx.createBufferSource(); s2.buffer = b2;
    const f2 = actx.createBiquadFilter(); f2.type='lowpass'; f2.frequency.value=200;
    const g2 = actx.createGain(); g2.gain.setValueAtTime(0.4,t+0.01); g2.gain.exponentialRampToValueAtTime(0.001,t+0.05);
    s2.connect(f2); f2.connect(g2); g2.connect(actx.destination); s2.start(t+0.01);
  }

  function flipCard(idx, ch) {
    const card = cards[idx];
    const tv   = card.querySelector('.tv');
    const bv   = card.querySelector('.bv');
    const flap = document.getElementById('flap' + idx);
    const fs   = document.getElementById('fs'   + idx);

    fs.textContent = tv.textContent;
    tv.textContent = ch;
    bv.textContent = ch;

    // Clone flap to force animation restart cleanly
    const newFlap = flap.cloneNode(true);
    newFlap.id = 'flap' + idx;
    flap.parentNode.replaceChild(newFlap, flap);
    void newFlap.offsetWidth;
    newFlap.classList.add('go');
    newFlap.addEventListener('animationend', () => newFlap.classList.remove('go'), { once: true });
  }

  function setCard(idx, ch, animate) {
    if (curVals[idx] === ch) return false;
    curVals[idx] = ch;
    const card = cards[idx];
    if (!animate) {
      card.querySelector('.tv').textContent = ch;
      card.querySelector('.bv').textContent = ch;
      document.getElementById('fs' + idx).textContent = ch;
    } else {
      flipCard(idx, ch);
    }
    return true;
  }

  function render(animate) {
    const h   = getHoursWasted();
    const str = h.toString().padStart(TOTAL_DIGITS, '0');
    let played = false;
    for (let i = 0; i < TOTAL_DIGITS; i++) {
      const changed = setCard(i, str[i], animate);
      if (changed && animate && !played) { playFlip(); played = true; }
    }
  }

  document.getElementById('title').textContent =
    `Hours wasted on life admin in the UK since ${new Date().getFullYear()}`;

  render(false);
  setInterval(() => render(true), 30000);
</script>
</body>
</html>
