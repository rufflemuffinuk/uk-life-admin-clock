<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UK Life Admin Hours</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2rem;
    min-height: 100vh;
    font-family: Arial, Helvetica, sans-serif;
  }

  h1 {
    font-size: clamp(1.1rem, 3vw, 1.6rem);
    font-weight: 900;
    color: #111;
    text-align: center;
    letter-spacing: -0.01em;
    line-height: 1.3;
  }

  /* ── Clock outer wrapper ── */
  .clock-outer {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  /* ── Top row: cards + commas ── */
  .clock {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  /* ── Label row: sits directly beneath the card row ── */
  .labels {
    display: flex;
    align-items: flex-start;
    gap: 4px;
  }

  /* Each label group spans exactly the same width as its digit group above */
  .label-group {
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .label-group span {
    font-size: 0.6rem;
    font-weight: 400;
    color: #999;
    letter-spacing: 0.08em;
    text-transform: lowercase;
    white-space: nowrap;
  }

  /* Spacer to align under commas */
  .label-spacer {
    /* matches .comma width: 1px margin each side + roughly the character width */
    width: 18px;
    flex-shrink: 0;
  }

  .comma {
    font-family: 'Bebas Neue', cursive;
    font-size: 2rem;
    color: #111;
    margin: 0 1px;
    padding-top: 14px;
    line-height: 1;
  }

  /* ── Card shell ── */
  .card {
    width: 44px;
    height: 60px;
    position: relative;
    perspective: 400px;
  }

  .face {
    position: absolute;
    inset: 0;
    border-radius: 5px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }

  .face::after {
    content: '';
    position: absolute;
    top: 50%; left: 0;
    width: 100%; height: 1px;
    background: rgba(0,0,0,0.55);
    z-index: 5;
  }

  .half {
    position: absolute;
    left: 0;
    width: 100%; height: 50%;
    overflow: hidden;
    display: flex;
    justify-content: center;
  }
  .half.top { top: 0;    align-items: flex-end;  background: #1c1c1c; }
  .half.bot { bottom: 0; align-items: flex-start; background: #111;   }

  .half span {
    font-family: 'Bebas Neue', cursive;
    font-size: 2.8rem;
    color: #fff;
    line-height: 1;
    display: block;
    user-select: none;
    transform: translateY(50%);
  }
  .half.bot span { transform: translateY(-50%); }

  .flap {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 50%;
    transform-origin: bottom center;
    overflow: hidden;
    border-radius: 5px 5px 0 0;
    background: #1c1c1c;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    z-index: 10;
    pointer-events: none;
    visibility: hidden;
  }

  .flap span {
    font-family: 'Bebas Neue', cursive;
    font-size: 2.8rem;
    color: #fff;
    line-height: 1;
    display: block;
    user-select: none;
    transform: translateY(50%);
  }

  .flap.go {
    visibility: visible;
    animation: flipDown 0.38s cubic-bezier(0.55, 0, 0.45, 1) forwards;
  }

  @keyframes flipDown {
    0%   { transform: rotateX(0deg);   }
    100% { transform: rotateX(-90deg); }
  }

  /* ── Citation ── */
  .citation {
    position: fixed;
    bottom: 1.5rem;
    left: 0; width: 100%;
    text-align: center;
    font-size: 0.75rem;
    font-weight: 400;
    color: #555;
    padding: 0 1rem;
    line-height: 1.6;
  }
  .citation a { color: #555; text-decoration: underline; }
  .citation a:hover { color: #111; }
</style>
</head>
<body>

<h1 id="title"></h1>

<div class="clock-outer">
  <div class="clock" id="clock"></div>
  <div class="labels" id="labels"></div>
</div>

<p id="nudge" style="font-size:0.7rem;color:#999;letter-spacing:0.1em;text-transform:uppercase;transition:opacity 0.5s;">
  ▶ Enable sound
</p>

<p class="citation">
  These hours are calculated from the paper
  <a href="https://researchrepository.ucd.ie/server/api/core/bitstreams/d56f7eeb-b102-46da-b060-0c969420d514/content" target="_blank">
    <em>Everyday Administrative Burdens and Inequality</em> by Lucie Martin, Liam Delaney and Orla Doyle
  </a>
</p>

<script>
  const HOURS_PER_YEAR = 15_000_000_000;
  const TOTAL_DIGITS   = 11;
  const INTERVAL_MS    = 5_000;   // 5 seconds
  const CASCADE_MS     = 80;

  // Groups: 2 digits, 3 digits, 3 digits, 3 digits
  // 11 digits total = 00,000,000,000
  // Positions:       [0-1] [2-4] [5-7] [8-10]
  // Labels:          "tens of billions" | "billions" | "millions" | "thousands" ... 
  // Simpler: label each GROUP by its leading denomination
  const GROUPS = [
    { count: 2, label: 'billion' },
    { count: 3, label: 'million' },
    { count: 3, label: 'thousand' },
    { count: 3, label: 'hundred' },
  ];

  function getHoursWasted() {
    const now       = new Date();
    const yearStart = new Date(now.getFullYear(), 0, 1);
    const yearEnd   = new Date(now.getFullYear() + 1, 0, 1);
    const rate      = HOURS_PER_YEAR / ((yearEnd - yearStart) / 1000);
    return Math.floor((now - yearStart) / 1000 * rate);
  }

  // ── Build DOM ──────────────────────────────────────────────────────────
  const clockEl  = document.getElementById('clock');
  const labelsEl = document.getElementById('labels');
  const cards    = [];
  const curVals  = Array(TOTAL_DIGITS).fill(null);

  GROUPS.forEach((group, gi) => {
    // -- Card group --
    for (let d = 0; d < group.count; d++) {
      const idx  = cards.length;
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="face">
          <div class="half top"><span class="tv">0</span></div>
          <div class="half bot"><span class="bv">0</span></div>
        </div>
        <div class="flap" id="flap${idx}"><span>0</span></div>`;
      clockEl.appendChild(card);
      cards.push(card);
    }

    // -- Label beneath this group --
    const labelGroup = document.createElement('div');
    labelGroup.className = 'label-group';
    // Width = count * card width + (count-1) * gap
    labelGroup.style.width = (group.count * 44 + (group.count - 1) * 4) + 'px';
    const lspan = document.createElement('span');
    lspan.textContent = group.label;
    labelGroup.appendChild(lspan);
    labelsEl.appendChild(labelGroup);

    // -- Comma separator (not after last group) --
    if (gi < GROUPS.length - 1) {
      const sep = document.createElement('div');
      sep.className = 'comma';
      sep.textContent = ',';
      clockEl.appendChild(sep);

      // Matching spacer in label row
      const spacer = document.createElement('div');
      spacer.className = 'label-spacer';
      labelsEl.appendChild(spacer);
    }
  });

  // ── Audio ──────────────────────────────────────────────────────────────
  let actx = null;

  function ensureAudio() {
    if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
    if (actx.state === 'suspended') actx.resume();
  }

  const nudge = document.getElementById('nudge');
  function unlockAudio() {
    ensureAudio();
    if (nudge) nudge.style.opacity = '0';
  }
  document.addEventListener('click',      unlockAudio);
  document.addEventListener('touchstart', unlockAudio);

  function playFlipSound(whenSec) {
    if (!actx || actx.state === 'suspended') return;
    const t = whenSec;

    const n  = Math.floor(actx.sampleRate * 0.06);
    const b  = actx.createBuffer(1, n, actx.sampleRate);
    const bd = b.getChannelData(0);
    for (let i = 0; i < n; i++) bd[i] = (Math.random()*2-1) * Math.exp(-i/(n*0.1));
    const src = actx.createBufferSource(); src.buffer = b;
    const flt = actx.createBiquadFilter(); flt.type = 'bandpass'; flt.frequency.value = 1800; flt.Q.value = 1;
    const gn  = actx.createGain();
    gn.gain.setValueAtTime(0.28, t);
    gn.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
    src.connect(flt); flt.connect(gn); gn.connect(actx.destination);
    src.start(t);

    const n2   = Math.floor(actx.sampleRate * 0.04);
    const b2   = actx.createBuffer(1, n2, actx.sampleRate);
    const b2d  = b2.getChannelData(0);
    for (let i = 0; i < n2; i++) b2d[i] = (Math.random()*2-1) * Math.exp(-i/(n2*0.3));
    const src2 = actx.createBufferSource(); src2.buffer = b2;
    const flt2 = actx.createBiquadFilter(); flt2.type = 'lowpass'; flt2.frequency.value = 200;
    const gn2  = actx.createGain();
    gn2.gain.setValueAtTime(0.4,  t + 0.01);
    gn2.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
    src2.connect(flt2); flt2.connect(gn2); gn2.connect(actx.destination);
    src2.start(t + 0.01);
  }

  // ── Flip a single card ─────────────────────────────────────────────────
  function flipCard(idx, oldChar, newChar, startDelayMs) {
    const card     = cards[idx];
    const tv       = card.querySelector('.tv');
    const bv       = card.querySelector('.bv');
    const flap     = document.getElementById('flap' + idx);
    const flapSpan = flap.querySelector('span');

    setTimeout(() => {
      flapSpan.textContent = oldChar;
      tv.textContent       = oldChar;
      bv.textContent       = newChar;

      flap.classList.remove('go');
      void flap.offsetWidth;
      flap.classList.add('go');

      ensureAudio();
      if (actx) playFlipSound(actx.currentTime);

      flap.addEventListener('animationend', () => {
        tv.textContent = newChar;
        flap.classList.remove('go');
      }, { once: true });

    }, startDelayMs);
  }

  // ── Render ─────────────────────────────────────────────────────────────
  function render(animate) {
    const h   = getHoursWasted();
    const str = h.toString().padStart(TOTAL_DIGITS, '0');

    if (!animate) {
      for (let i = 0; i < TOTAL_DIGITS; i++) {
        curVals[i] = str[i];
        cards[i].querySelector('.tv').textContent = str[i];
        cards[i].querySelector('.bv').textContent = str[i];
        document.querySelector(`#flap${i} span`).textContent = str[i];
      }
      return;
    }

    let order = 0;
    for (let i = 0; i < TOTAL_DIGITS; i++) {
      if (str[i] !== curVals[i]) {
        const old = curVals[i];
        curVals[i] = str[i];
        flipCard(i, old, str[i], order * CASCADE_MS);
        order++;
      }
    }
  }

  document.getElementById('title').textContent =
    `Hours spent on life admin by the UK Public since the year ${new Date().getFullYear()}`;

  render(false);
  setInterval(() => render(true), INTERVAL_MS);
</script>
</body>
</html>
